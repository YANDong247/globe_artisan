<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World | H5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0b1020;
      --bg-2: #153f5f;
      --bg-3: #f3c677;
      --card: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.82);
      --accent: #ff7a18;
      --accent-2: #ffe53b;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      font-family: "Space Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 15%, rgba(255, 229, 59, 0.35), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(255, 122, 24, 0.25), transparent 32%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(6px);
      pointer-events: none;
      opacity: 0.5;
      mix-blend-mode: screen;
    }

    .orb-1 {
      width: 240px;
      height: 240px;
      left: -60px;
      bottom: -60px;
      background: #5ce1e6;
      animation: float1 9s ease-in-out infinite;
    }

    .orb-2 {
      width: 180px;
      height: 180px;
      right: -40px;
      top: 8%;
      background: #ffd166;
      animation: float2 10s ease-in-out infinite;
    }

    .card {
      width: 100vw;
      max-width: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 0;
      padding: 2.2rem 1.4rem;
      background: var(--card);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      text-align: center;
      transform: translateY(24px);
      opacity: 0;
      animation: cardIn 900ms cubic-bezier(.18,.7,.25,1) 120ms forwards;
    }

    .kicker {
      display: inline-block;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      color: #1b1b1b;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      margin-bottom: 1rem;
      text-transform: uppercase;
      font-weight: 700;
      animation: fadeUp 700ms ease-out 380ms both;
    }

    h1 {
      font-family: "ZCOOL XiaoWei", "KaiTi", serif;
      display: inline-block;
      max-width: 100%;
      white-space: nowrap;
      font-size: clamp(1.45rem, 5.2vw, 4.4rem);
      line-height: 1.05;
      letter-spacing: 0.02em;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
      animation: fadeUp 700ms ease-out 520ms both;
    }

    .subtitle {
      margin-top: 0.9rem;
      font-size: clamp(1rem, 2.7vw, 1.2rem);
      color: var(--text-sub);
      animation: fadeUp 700ms ease-out 650ms both;
    }

    .spark {
      display: inline-block;
      margin-left: 0.25rem;
      animation: spinGlow 3.2s linear infinite;
      transform-origin: center;
    }

    .btn-link {
      display: inline-block;
      margin-top: 0.9rem;
      padding: 0.64rem 1rem;
      border-radius: 0;
      color: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.45);
      text-decoration: none;
      font-weight: 600;
      transition: transform 200ms ease, background-color 200ms ease;
      animation: fadeUp 700ms ease-out 860ms both;
    }

    .btn-link:hover {
      transform: translateY(-2px);
      background-color: rgba(255, 255, 255, 0.12);
    }

    @media (max-width: 480px) {
      .card {
        padding: 1.7rem 1.1rem;
      }

      .subtitle {
        line-height: 1.5;
      }
    }

    @keyframes cardIn {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spinGlow {
      0% {
        transform: rotate(0deg) scale(1);
        filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
      }
      50% {
        transform: rotate(180deg) scale(1.08);
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.55));
      }
      100% {
        transform: rotate(360deg) scale(1);
        filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0));
      }
    }

    @keyframes bgShift {
      0% {
        background-position: 0% 0%, 100% 0%, 0% 0%;
      }
      100% {
        background-position: 6% 8%, 94% 10%, 100% 100%;
      }
    }

    @keyframes float1 {
      0%,
      100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(26px, -18px);
      }
    }

    @keyframes float2 {
      0%,
      100% {
        transform: translate(0, 0);
      }
      50% {
        transform: translate(-20px, 22px);
      }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <main class="card">
    <span class="kicker">Demo　1.0</span>
    <h1>
      江南寸玩古风私藏
      <span class="spark">✦</span>
    </h1>
    <p class="subtitle">核雕／奇石／鼻烟壶</p>
    <a class="btn-link" href="main.html">请君博览</a>
  </main>
</body>
</html>
